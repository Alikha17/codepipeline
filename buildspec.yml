version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    ECR_REPO: eks-demo
    CLUSTER_NAME: my-eks-cluster
    HELM_RELEASE: myapp

phases:

  pre_build:
    commands:
      - echo Logging in to ECR
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 238991998648.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=113461832962.dkr.ecr.ap-south-1.amazonaws.com/alikha-codebuild
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)

  build:
    commands:
      - echo Building Docker image
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo Updating kubeconfig
      - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - echo Deploying with Helm
      - helm upgrade --install $HELM_RELEASE ./helm/myapp \
          --set image.repository=$REPOSITORY_URI \
          --set image.tag=$IMAGE_TAG
