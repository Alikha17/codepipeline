version: 0.2

env:
  variables:
    AWS_REGION: "ap-south-1"
    CLUSTER_NAME: "my-cluster"
    HELM_RELEASE: "myapp"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 113461832962.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=113461832962.dkr.ecr.$AWS_REGION.amazonaws.com/alikha-codebuild
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - echo "Repository URI: $REPOSITORY_URI"
      - echo "Image Tag: $IMAGE_TAG"

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t app:$IMAGE_TAG .
      - docker tag app:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Updating kubeconfig for EKS cluster...
      - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION
      - echo Deploying application to EKS using Helm...
      - helm upgrade --install $HELM_RELEASE ./helm/myapp --set image.repository=$REPOSITORY_URI --set image.tag=$IMAGE_TAG
      - echo Deployment complete!

artifacts:
  files:
    - '**/*'
